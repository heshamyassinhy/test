<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التدريب | أكاديمية درعه</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pink-btn {
            background: #ff69b4;
            transition: all 0.3s;
        }
        .pink-btn:hover {
            background: #ff1493;
            transform: translateY(-2px);
        }
        .course-card {
            transition: transform 0.3s;
        }
        .course-card:hover {
            transform: translateY(-5px);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff69b4;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10 glass p-6 rounded-3xl">
            <div>
                <h1 class="text-3xl font-bold">مرحباً بك في <span class="text-pink-400">درعه</span></h1>
                <p class="text-gray-400">دوراتك التدريبية المسجلة حالياً</p>
            </div>
            <div class="hidden md:block">
                <div class="w-12 h-12 rounded-full bg-pink-500 flex items-center justify-center font-bold text-xl">
                    D
                </div>
            </div>
        </div>

        <!-- Courses Grid -->
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
            <span class="w-2 h-8 bg-pink-500 rounded-full"></span>
            الدورات المتاحة
        </h2>
        
        <div id="coursesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- سيتم تحميل الدورات هنا برمجياً -->
        </div>
    </div>

    <!-- مشغل المحتوى (Modal) -->
    <div id="playerModal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden z-50 overflow-y-auto">
        <div class="max-w-6xl mx-auto p-4 md:p-10">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold text-pink-400">اسم الدورة</h2>
                <button onclick="closePlayer()" class="text-4xl text-white hover:text-pink-400 transition-colors">&times;</button>
            </div>

            <div class="grid lg:grid-cols-3 gap-8">
                <!-- قسم الفيديو الرئيسي -->
                <div class="lg:col-span-2">
                    <div class="glass rounded-3xl overflow-hidden aspect-video bg-black relative shadow-2xl">
                        <video id="mainVideo" controls class="w-full h-full" playsinline>
                            <p>المتصفح لا يدعم تشغيل الفيديو</p>
                        </video>
                    </div>
                    <div class="mt-6 p-4 glass rounded-2xl">
                        <h3 id="lessonTitleDisplay" class="text-xl font-bold text-white mb-2">اسم الدرس</h3>
                        <p class="text-gray-400 text-sm italic">أكاديمية درعه - التدريب الذكي</p>
                    </div>
                </div>

                <!-- قائمة الدروس الجانبية -->
                <div class="space-y-4">
                    <h3 class="font-bold border-b border-white/10 pb-2 text-pink-400">محتوى الدورة</h3>
                    <div id="lessonsMenu" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2">
                        <!-- قائمة الفيديوهات المرفوعة -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allCourses = [];
        let activeCourse = null;

        // دالة تحميل البيانات من الـ Local Storage
        function loadData() {
            try {
                const storedData = localStorage.getItem('deraah_courses');
                if (storedData) {
                    allCourses = JSON.parse(storedData);
                }
                renderCourses();
            } catch (e) {
                console.error("Error loading data", e);
            }
        }

        // دالة عرض الكروت في الصفحة الرئيسية
        function renderCourses() {
            const grid = document.getElementById('coursesGrid');
            grid.innerHTML = '';

            const publishedCourses = allCourses.filter(c => c.published);

            if (publishedCourses.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">لا توجد دورات منشورة حالياً.</div>';
                return;
            }

            publishedCourses.forEach((course, index) => {
                grid.innerHTML += `
                    <div class="glass p-4 rounded-3xl course-card">
                        <img src="${course.image || 'https://via.placeholder.com/400x225?text=Deraah'}" 
                             class="w-full h-44 object-cover rounded-2xl mb-4 shadow-lg">
                        <h3 class="text-xl font-bold mb-4 line-clamp-1">${course.name}</h3>
                        <button onclick="openPlayerByIndex(${index})" 
                                class="pink-btn w-full py-3 rounded-xl font-bold shadow-lg shadow-pink-500/20">
                            دخول الدورة
                        </button>
                    </div>
                `;
            });
        }

        // فتح المشغل باستخدام الـ Index لتجنب مشاكل Encode البيانات الضخمة (Base64)
        function openPlayerByIndex(index) {
            const publishedCourses = allCourses.filter(c => c.published);
            const course = publishedCourses[index];
            if (!course) return;

            activeCourse = course;
            document.getElementById('modalTitle').innerText = course.name;
            document.getElementById('playerModal').style.display = 'block';
            document.body.style.overflow = 'hidden';

            const menu = document.getElementById('lessonsMenu');
            menu.innerHTML = '';

            if (!course.lessons || course.lessons.length === 0) {
                menu.innerHTML = '<p class="text-gray-500 text-sm">لا يوجد محتوى متاح بعد.</p>';
                return;
            }

            course.lessons.forEach((lesson, i) => {
                menu.innerHTML += `
                    <button onclick="playVideo(${i})" 
                            class="w-full text-right p-4 rounded-xl bg-white/5 hover:bg-pink-500/20 border border-white/5 transition-all flex items-center gap-3">
                        <span class="w-8 h-8 rounded-full bg-pink-500/20 flex items-center justify-center text-pink-400 text-xs">${i + 1}</span>
                        <div class="flex-1">
                            <p class="text-sm font-bold text-white">${lesson.name}</p>
                            <p class="text-[10px] text-gray-500">فيديو تعليمي</p>
                        </div>
                    </button>
                `;
            });

            playVideo(0);
        }

        // دالة تشغيل الفيديو المختار
        function playVideo(index) {
            if (!activeCourse || !activeCourse.lessons[index]) return;
            
            const lesson = activeCourse.lessons[index];
            const videoElement = document.getElementById('mainVideo');
            const titleDisplay = document.getElementById('lessonTitleDisplay');

            titleDisplay.innerText = lesson.name;

            // جلب الرابط مع التأكد من عدم وجود مسافات زائدة
            const videoSrc = (lesson.fileUrl || lesson.content || lesson.url || "").trim();

            if (videoSrc) {
                videoElement.pause();
                videoElement.removeAttribute('src'); // تنظيف المصدر القديم
                videoElement.src = videoSrc;
                videoElement.load();
                
                // محاولة التشغيل مع معالجة الأخطاء
                const playPromise = videoElement.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Play interrupted or requires interaction");
                    });
                }
            } else {
                alert("عذراً، ملف الفيديو لهذا الدرس غير متوفر.");
            }
        }

        // دالة إغلاق المشغل
        function closePlayer() {
            const videoElement = document.getElementById('mainVideo');
            videoElement.pause();
            videoElement.src = "";
            document.getElementById('playerModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('focus', loadData);
        window.onload = loadData;
    </script>
</body>
</html>
