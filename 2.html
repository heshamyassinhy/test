<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | إدارة الفيديوهات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pink-btn { background: #ff69b4; transition: all 0.3s; }
        .pink-btn:hover { background: #ff1493; transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 glass p-6 rounded-3xl">
            <div>
                <h1 class="text-3xl font-bold">لوحة تحكم <span class="text-pink-400">المشرف</span></h1>
                <p class="text-gray-400">ارفع الفيديوهات من جهازك لتظهر للمتدربين</p>
            </div>
            <button onclick="showCreateModal()" class="pink-btn px-6 py-3 rounded-xl font-bold">+ إنشاء دورة</button>
        </div>

        <div id="coursesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- Modal: Create Course -->
    <div id="createModal" class="fixed inset-0 bg-black/80 hidden z-50 items-center justify-center p-4">
        <div class="glass max-w-lg w-full p-8 rounded-3xl">
            <h2 class="text-2xl font-bold mb-6 text-pink-400">إضافة دورة جديدة</h2>
            <input type="text" id="courseName" placeholder="اسم الدورة" class="w-full bg-white/10 p-3 rounded-xl mb-4 outline-none border border-white/10">
            <input type="file" id="courseImg" accept="image/*" class="mb-4 block text-sm">
            <button onclick="saveCourse()" class="pink-btn w-full py-3 rounded-xl font-bold">حفظ الأساسيات</button>
            <button onclick="hideModal('createModal')" class="w-full mt-2 text-gray-400 text-sm">إلغاء</button>
        </div>
    </div>

    <!-- Modal: Edit Content (الذي يحتوي على رفع الفيديو) -->
    <div id="editModal" class="fixed inset-0 bg-black/90 hidden z-50 overflow-y-auto p-4">
        <div class="glass max-w-4xl mx-auto my-8 p-8 rounded-3xl relative">
            <button onclick="hideModal('editModal')" class="absolute top-4 left-4 text-2xl text-gray-400">&times;</button>
            <h2 class="text-2xl font-bold mb-8 text-pink-400">إدارة محتوى: <span id="editCourseTitle" class="text-white"></span></h2>
            
            <div class="grid md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <h3 class="font-bold border-b border-white/10 pb-2">المحتوى الحالي</h3>
                    <div id="lessonsList" class="space-y-2"></div>
                </div>

                <div class="space-y-4 bg-white/5 p-6 rounded-2xl">
                    <h3 class="font-bold text-pink-300">رفع فيديو جديد من الكمبيوتر</h3>
                    <input type="text" id="lessonName" placeholder="عنوان الدرس" class="w-full bg-white/10 p-2 rounded-lg text-sm">
                    <input type="file" id="contentFile" accept="video/*" class="w-full text-xs">
                    <div id="uploadStatus" class="text-xs text-pink-400 hidden">جاري معالجة الفيديو... يرجى الانتظار</div>
                    <button id="addLessonBtn" onclick="addLessonWithFile()" class="w-full bg-pink-500 py-2 rounded-lg font-bold text-sm">إضافة الفيديو للدورة</button>
                </div>
            </div>
            
            <div class="mt-8 pt-6 border-t border-white/10 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="isPublished" class="w-5 h-5">
                    <label>نشر الدورة للجميع</label>
                </div>
                <button onclick="updateCourseData()" class="pink-btn px-8 py-2 rounded-lg font-bold">حفظ نهائي</button>
            </div>
        </div>
    </div>

    <script>
        let courses = JSON.parse(localStorage.getItem('deraah_courses')) || [];
        let currentEditId = null;

        function renderCourses() {
            const container = document.getElementById('coursesContainer');
            container.innerHTML = '';
            courses.forEach(course => {
                container.innerHTML += `
                    <div class="glass p-4 rounded-3xl">
                        <img src="${course.image || ''}" class="w-full h-32 object-cover rounded-2xl mb-4 bg-gray-800">
                        <h3 class="font-bold">${course.name}</h3>
                        <div class="mt-4 flex gap-2">
                            <button onclick="openEdit(${course.id})" class="flex-1 bg-white/10 py-2 rounded-lg text-xs">تعديل المحتوى</button>
                            <button onclick="deleteCourse(${course.id})" class="bg-red-500/20 text-red-400 px-3 py-2 rounded-lg text-xs">حذف</button>
                        </div>
                    </div>`;
            });
        }

        function showCreateModal() { document.getElementById('createModal').style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        async function saveCourse() {
            const name = document.getElementById('courseName').value;
            const imgInput = document.getElementById('courseImg');
            if(!name) return alert("الاسم مطلوب");

            let imgData = "";
            if(imgInput.files[0]) {
                imgData = await toBase64(imgInput.files[0]);
            }

            courses.push({ id: Date.now(), name, image: imgData, lessons: [], published: false, enrolled: 'all' });
            localStorage.setItem('deraah_courses', JSON.stringify(courses));
            renderCourses();
            hideModal('createModal');
        }

        function openEdit(id) {
            currentEditId = id;
            const course = courses.find(c => c.id === id);
            document.getElementById('editCourseTitle').innerText = course.name;
            document.getElementById('isPublished').checked = course.published;
            renderLessonsList();
            document.getElementById('editModal').style.display = 'block';
        }

        function renderLessonsList() {
            const course = courses.find(c => c.id === currentEditId);
            const list = document.getElementById('lessonsList');
            list.innerHTML = course.lessons.map((l, i) => `
                <div class="flex justify-between items-center bg-white/5 p-2 rounded-lg text-sm">
                    <span>${l.name}</span>
                    <button onclick="removeLesson(${i})" class="text-red-400">حذف</button>
                </div>
            `).join('');
        }

        async function addLessonWithFile() {
            const name = document.getElementById('lessonName').value;
            const fileInput = document.getElementById('contentFile');
            const status = document.getElementById('uploadStatus');
            const btn = document.getElementById('addLessonBtn');

            if(!name || !fileInput.files[0]) return alert("اختر اسماً وفيديو");

            status.classList.remove('hidden');
            btn.disabled = true;

            try {
                const videoData = await toBase64(fileInput.files[0]);
                const course = courses.find(c => c.id === currentEditId);
                course.lessons.push({
                    name: name,
                    type: 'video',
                    fileUrl: videoData // هنا يتم حفظ فيديو الكمبيوتر كـ Data URL
                });
                renderLessonsList();
                fileInput.value = '';
                document.getElementById('lessonName').value = '';
            } catch (e) {
                alert("فشل رفع الفيديو، قد يكون الحجم كبيراً جداً على المتصفح");
            } finally {
                status.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function removeLesson(idx) {
            const course = courses.find(c => c.id === currentEditId);
            course.lessons.splice(idx, 1);
            renderLessonsList();
        }

        function updateCourseData() {
            const course = courses.find(c => c.id === currentEditId);
            course.published = document.getElementById('isPublished').checked;
            localStorage.setItem('deraah_courses', JSON.stringify(courses));
            renderCourses();
            hideModal('editModal');
            alert("تم الحفظ بنجاح!");
        }

        function deleteCourse(id) {
            if(confirm('حذف؟')) {
                courses = courses.filter(c => c.id !== id);
                localStorage.setItem('deraah_courses', JSON.stringify(courses));
                renderCourses();
            }
        }

        // تحويل الملف لنص برمجى يمكن حفظه
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        renderCourses();
    </script>
</body>
</html>
